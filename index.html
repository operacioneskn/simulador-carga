<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KN Materiales - Simulador 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; }
        #ui { position: absolute; top: 10px; left: 10px; width: 260px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-height: 95vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; font-size: 12px; }
        input, select { width: 110px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #28a745; color: white; }
        #listaMateriales { max-height: 200px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
        .item-lista { padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        #instrucciones { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 6px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
  <h3>KN Materiales - Logística</h3>
  <div class="row">Catálogo: <select id="selCatalogo"><option value="">-- Seleccionar --</option></select></div>
  <hr>
  <div class="row">Nombre: <input type="text" id="matName" value="Tarima Cemento"></div>
  <div class="row">Largo (m): <input type="number" id="matLargo" value="1.2" step="0.1"></div>
  <div class="row">Ancho (m): <input type="number" id="matAncho" value="1.0" step="0.1"></div>
  <div class="row">Alto (m): <input type="number" id="matAlto" value="1.0" step="0.1"></div>
  <div class="row">Color: <input type="color" id="matColor" value="#808080"></div>
  <button id="btnSaveToCat" style="background:#007bff; font-size:11px;">+ Guardar en Catálogo</button>
  <button id="btnAdd">Añadir a Plataforma</button>
  <hr>
  <div id="listaMateriales"></div>
  <div style="display:flex; gap:5px; margin-top:10px;">
    <button id="btnVistaSuperior" style="background:#17a2b8; font-size:11px; padding:8px;">📐 Vista Superior</button>
    <button id="btnCapture" style="background:#6c757d; font-size:11px; padding:8px;">📸 Guardar Imagen</button>
  </div>
  <button id="btnClear" style="background:#dc3545; margin-top:15px;">Vaciar Todo</button>
</div>

<div id="instrucciones">
  <b>Controles:</b><br>
  • Clic Izquierdo: Rotar / Mover pieza<br>
  • Clic Derecho: Desplazarse (Pan)<br>
  • Shift + Arrastrar: Apilar
</div>
<div id="container3d"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { DragControls } from 'three/addons/controls/DragControls.js';

    let scene, camera, renderer, controls, dragControls;
    let objetosCargados = [];
    let catalogoMateriales = [];
    let isShiftPressed = false;
    let etiquetasAereas = [];

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(18, 12, 18);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('container3d').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.zoomSpeed = 0.4;
        controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        crearEscenario();

        window.addEventListener('keydown', (e) => { if(e.key === "Shift") isShiftPressed = true; });
        window.addEventListener('keyup', (e) => { if(e.key === "Shift") isShiftPressed = false; });
        
        document.getElementById('btnAdd').onclick = añadirMaterial;
        document.getElementById('btnSaveToCat').onclick = guardarEnCatalogo;
        document.getElementById('selCatalogo').onchange = cargarDesdeCatalogo;
        document.getElementById('btnClear').onclick = vaciar;
        document.getElementById('btnCapture').onclick = capturarImagen;
        document.getElementById('btnVistaSuperior').onclick = () => {
            camera.position.set(6, 18, 0); 
            controls.target.set(6, 0, 0);
            controls.update();
        };

        cargarCatalogoDeMemoria();
        cargarEscenaDeMemoria();
        setupDragControls();
    }

    function crearEscenario() {
        const plataforma = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 3), new THREE.MeshPhongMaterial({ color: 0x1a1a1a }));
        plataforma.position.set(6, -0.1, 0);
        scene.add(plataforma);
        for(let i=0; i<=12; i++) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.05, 3.1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            line.rotation.x = -Math.PI/2;
            line.position.set(i, 0.01, 0);
            scene.add(line);
        }
        scene.add(new THREE.GridHelper(50, 50, 0x444444, 0x222222));
    }

    function crearEtiquetaFlotante(texto) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256; canvas.height = 64;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'Bold 32px Arial';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(texto, canvas.width/2, canvas.height/2);
        const textura = new THREE.CanvasTexture(canvas);
        const spriteMaterial = new THREE.SpriteMaterial({ map: textura });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(1.5, 0.375, 1); 
        return sprite;
    }

    function setupDragControls() {
        if(dragControls) dragControls.dispose();
        dragControls = new DragControls(objetosCargados, camera, renderer.domElement);
        dragControls.addEventListener('dragstart', () => controls.enabled = false);
        dragControls.addEventListener('drag', (e) => {
            const obj = e.object;
            if (isShiftPressed) {
                obj.position.x = obj.userData.lastX || obj.position.x;
                obj.position.z = obj.userData.lastZ || obj.position.z;
            } else {
                obj.position.y = obj.userData.currentY || (obj.userData.alto / 2);
                obj.userData.lastX = obj.position.x;
                obj.userData.lastZ = obj.position.z;
            }
            guardarEscenaEnMemoria();
        });
        dragControls.addEventListener('dragend', (e) => {
            controls.enabled = true;
            e.object.userData.currentY = e.object.position.y;
        });
    }

    function guardarEnCatalogo() {
        const mat = { nombre: document.getElementById('matName').value, l: parseFloat(document.getElementById('matLargo').value), a: parseFloat(document.getElementById('matAncho').value), h: parseFloat(document.getElementById('matAlto').value), c: document.getElementById('matColor').value };
        catalogoMateriales.push(mat);
        localStorage.setItem('kn_catalogo', JSON.stringify(catalogoMateriales));
        actualizarSelectCatalogo();
    }

    function cargarDesdeCatalogo(e) {
        const m = catalogoMateriales[e.target.value];
        if(!m) return;
        document.getElementById('matName').value = m.nombre;
        document.getElementById('matLargo').value = m.l;
        document.getElementById('matAncho').value = m.a;
        document.getElementById('matAlto').value = m.h;
        document.getElementById('matColor').value = m.c;
    }

    function actualizarSelectCatalogo() {
        const sel = document.getElementById('selCatalogo');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        catalogoMateriales.forEach((m, i) => {
            const opt = document.createElement('option'); opt.value = i; opt.innerText = m.nombre; sel.appendChild(opt);
        });
    }

    function añadirMaterial() {
        const l = parseFloat(document.getElementById('matLargo').value);
        const a = parseFloat(document.getElementById('matAncho').value);
        const h = parseFloat(document.getElementById('matAlto').value);
        const col = document.getElementById('matColor').value;
        const nom = document.getElementById('matName').value;
        crearBloque(l, a, h, col, nom, l/2, h/2, 0);
        guardarEscenaEnMemoria();
    }

    function crearBloque(l, a, h, col, nom, x, y, z, id = Date.now()) {
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(l, h, a), new THREE.MeshPhongMaterial({ color: col }));
        mesh.position.set(x, y, z);
        mesh.userData = { largo: l, ancho: a, alto: h, nombre: nom, id: id, color: col, currentY: y };
        scene.add(mesh);
        objetosCargados.push(mesh);
        const etiqueta = crearEtiquetaFlotante(nom);
        mesh.add(etiqueta);
        etiqueta.position.set(0, h/2 + 0.3, 0);
        etiquetasAereas.push(etiqueta);
        setupDragControls();
        actualizarInterfaz();
    }

    function guardarEscenaEnMemoria() {
        const datos = objetosCargados.map(o => ({ p: o.position, d: o.userData }));
        localStorage.setItem('kn_escena', JSON.stringify(datos));
    }

    function cargarEscenaDeMemoria() {
        const data = localStorage.getItem('kn_escena');
        if(data) JSON.parse(data).forEach(item => crearBloque(item.d.largo, item.d.ancho, item.d.alto, item.d.color, item.d.nombre, item.p.x, item.p.y, item.p.z, item.d.id));
    }

    function cargarCatalogoDeMemoria() {
        const data = localStorage.getItem('kn_catalogo');
        if(data) { catalogoMateriales = JSON.parse(data); actualizarSelectCatalogo(); }
    }

    function actualizarInterfaz() {
        const list = document.getElementById('listaMateriales');
        list.innerHTML = '';
        objetosCargados.forEach(obj => {
            const d = document.createElement('div'); d.className = 'item-lista';
            d.innerHTML = `<span>${obj.userData.nombre}</span> <button onclick="window.borrar(${obj.userData.id})" style="width:20px; background:red; padding:2px;">X</button>`;
            list.appendChild(d);
        });
    }

    window.borrar = (id) => {
        const idx = objetosCargados.findIndex(o => o.userData.id === id);
        if(idx > -1) { scene.remove(objetosCargados[idx]); objetosCargados.splice(idx, 1); actualizarInterfaz(); guardarEscenaEnMemoria(); setupDragControls(); }
    };

    function vaciar() {
        if(confirm("¿Vaciar plataforma?")) {
            objetosCargados.forEach(o => scene.remove(o)); objetosCargados.length = 0;
            localStorage.removeItem('kn_escena'); actualizarInterfaz(); setupDragControls();
        }
    }

    function capturarImagen() {
        renderer.render(scene, camera);
        const link = document.createElement('a');
        link.download = `Carga_KN_${new Date().getTime()}.png`;
        link.href = renderer.domElement.toDataURL("image/png");
        link.click();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
