<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KN Materiales - Simulador Master</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; width: 260px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; font-size: 12px; }
        input, select { width: 110px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
        input[type="color"] { width: 40px; height: 25px; padding: 0; border: none; cursor: pointer; }
        button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; color: white; }
        
        .stack-control { background: #e7f1ff; padding: 10px; border-radius: 6px; border: 2px solid #007bff; margin: 10px 0; text-align: center; }
        .switch { position: relative; display: inline-block; width: 44px; height: 20px; vertical-align: middle; margin-left: 8px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(24px); }

        #listaMateriales { max-height: 150px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
        .item-lista { padding: 6px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        #container3d { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="ui">
  <h3 style="margin:0 0 10px 0; color:#1a202c; border-bottom: 2px solid #28a745;">KN Materiales</h3>
  
  <div class="row">
    <b>CATÁLOGO:</b>
    <select id="selCatalogo"><option value="">-- Seleccionar --</option></select>
  </div>

  <div class="stack-control">
    <span style="font-weight:bold; color:#007bff; font-size:12px;">MODO APILAR (Z)</span>
    <label class="switch">
      <input type="checkbox" id="checkStack">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">Nombre: <input type="text" id="matName" placeholder="Material"></div>
  <div class="row">Medidas (m): 
    <input type="number" id="matLargo" step="0.1" style="width:35px;" title="Largo"> 
    <input type="number" id="matAncho" step="0.1" style="width:35px;" title="Ancho">
    <input type="number" id="matAlto" step="0.1" style="width:35px;" title="Alto">
  </div>
  <div class="row">Color Material: <input type="color" id="matColor" value="#808080"></div>
  
  <button id="btnSaveToCat" style="background:#007bff; font-size:11px;">💾 GUARDAR EN MI CATÁLOGO</button>
  <button id="btnAdd" style="background:#28a745;">+ AÑADIR AL CAMIÓN</button>
  
  <div id="listaMateriales"></div>
  
  <div style="display:flex; gap:5px; margin-top:10px;">
    <button id="btnVistaSuperior" style="background:#17a2b8; font-size:11px;">📐 PLANO</button>
    <button id="btnCapture" style="background:#6c757d; font-size:11px;">📸 FOTO</button>
  </div>
  <button id="btnClear" style="background:#dc3545; font-size:11px; margin-top:10px;">VACIAR TODO</button>
</div>

<div id="container3d"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { DragControls } from 'three/addons/controls/DragControls.js';

    const CATALOGO_FIJO = [
        { nombre: "Tarima Cemento", l: 1.20, a: 1.00, h: 1.00, color: "#808080" },
        { nombre: "Tarima Block", l: 1.20, a: 1.00, h: 1.20, color: "#a9a9a9" },
        { nombre: "Armex (Atado)", l: 6.00, a: 0.20, h: 0.20, color: "#cd7f32" },
        { nombre: "Varilla 3/8", l: 12.00, a: 0.25, h: 0.20, color: "#4b4b4b" }
    ];

    let scene, camera, renderer, controls, dragControls;
    let objetosCargados = [];
    let isStackingMode = false;
    let miCatalogoPersonal = [];

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xedf2f7);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container3d').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        crearEscenario();
        cargarMemoriaCatalogo();
        actualizarSelectUI();

        document.getElementById('checkStack').onchange = (e) => isStackingMode = e.target.checked;
        document.getElementById('selCatalogo').onchange = (e) => seleccionarDeCatalogo(e.target.value);
        document.getElementById('btnAdd').onclick = añadirMaterial;
        document.getElementById('btnSaveToCat').onclick = guardarNuevoEnCatalogo;
        document.getElementById('btnClear').onclick = vaciar;
        document.getElementById('btnCapture').onclick = capturarImagen;
        document.getElementById('btnVistaSuperior').onclick = () => {
            camera.position.set(6, 18, 0); 
            controls.target.set(6, 0, 0);
            controls.update();
        };

        setupDragControls();
    }

    function cargarMemoriaCatalogo() {
        const guardado = localStorage.getItem('kn_mi_catalogo');
        if(guardado) miCatalogoPersonal = JSON.parse(guardado);
    }

    function actualizarSelectUI() {
        const sel = document.getElementById('selCatalogo');
        sel.innerHTML = '<option value="">-- Seleccionar --</option>';
        const optGrupo1 = document.createElement('optgroup');
        optGrupo1.label = "MATERIALES KN";
        CATALOGO_FIJO.forEach((m, i) => {
            const opt = document.createElement('option');
            opt.value = `fijo-${i}`;
            opt.innerText = m.nombre;
            optGrupo1.appendChild(opt);
        });
        sel.appendChild(optGrupo1);
        if(miCatalogoPersonal.length > 0) {
            const optGrupo2 = document.createElement('optgroup');
            optGrupo2.label = "MIS GUARDADOS";
            miCatalogoPersonal.forEach((m, i) => {
                const opt = document.createElement('option');
                opt.value = `pers-${i}`;
                opt.innerText = m.nombre;
                optGrupo2.appendChild(opt);
            });
            sel.appendChild(optGrupo2);
        }
    }

    function seleccionarDeCatalogo(val) {
        if(!val) return;
        let m;
        const [tipo, index] = val.split('-');
        if(tipo === 'fijo') m = CATALOGO_FIJO[index];
        else m = miCatalogoPersonal[index];

        document.getElementById('matName').value = m.nombre;
        document.getElementById('matLargo').value = m.l;
        document.getElementById('matAncho').value = m.a;
        document.getElementById('matAlto').value = m.h;
        document.getElementById('matColor').value = m.color;
    }

    function guardarNuevoEnCatalogo() {
        const nom = document.getElementById('matName').value;
        const l = parseFloat(document.getElementById('matLargo').value);
        const a = parseFloat(document.getElementById('matAncho').value);
        const h = parseFloat(document.getElementById('matAlto').value);
        const color = document.getElementById('matColor').value;
        if(!nom) { alert("Ponle un nombre"); return; }
        miCatalogoPersonal.push({ nombre: nom, l, a, h, color });
        localStorage.setItem('kn_mi_catalogo', JSON.stringify(miCatalogoPersonal));
        actualizarSelectUI();
        alert("¡Guardado!");
    }

    function crearEscenario() {
        const plataforma = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 3), new THREE.MeshPhongMaterial({ color: 0x2d3748 }));
        plataforma.position.set(6, -0.1, 0);
        scene.add(plataforma);
        scene.add(new THREE.GridHelper(40, 40, 0xcbd5e0, 0xd1d5db));
    }

    function añadirMaterial() {
        const l = parseFloat(document.getElementById('matLargo').value);
        const a = parseFloat(document.getElementById('matAncho').value);
        const h = parseFloat(document.getElementById('matAlto').value);
        const nom = document.getElementById('matName').value;
        const col = document.getElementById('matColor').value;

        const mesh = new THREE.Mesh(new THREE.BoxGeometry(l, h, a), new THREE.MeshPhongMaterial({ color: col }));
        mesh.position.set(l/2, h/2, 0);
        mesh.userData = { alto: h, nombre: nom, id: Date.now(), currentY: h/2 };
        
        scene.add(mesh);
        objetosCargados.push(mesh);
        actualizarInterfazLista();
        setupDragControls();
    }

    function setupDragControls() {
        if(dragControls) dragControls.dispose();
        dragControls = new DragControls(objetosCargados, camera, renderer.domElement);
        dragControls.addEventListener('dragstart', () => controls.enabled = false);
        dragControls.addEventListener('drag', (e) => {
            const obj = e.object;
            if (isStackingMode) {
                obj.position.x = obj.userData.lastX || obj.position.x;
                obj.position.z = obj.userData.lastZ || obj.position.z;
            } else {
                obj.position.y = obj.userData.currentY || (obj.userData.alto / 2);
                obj.userData.lastX = obj.position.x;
                obj.userData.lastZ = obj.position.z;
            }
        });
        dragControls.addEventListener('dragend', (e) => {
            controls.enabled = true;
            e.object.userData.currentY = e.object.position.y;
        });
    }

    function actualizarInterfazLista() {
        const list = document.getElementById('listaMateriales');
        list.innerHTML = '';
        objetosCargados.forEach(obj => {
            const d = document.createElement('div'); d.className = 'item-lista';
            d.innerHTML = `<span>${obj.userData.nombre}</span> <button onclick="window.borrar(${obj.userData.id})" style="width:25px; background:#e53e3e; padding:2px;">X</button>`;
            list.appendChild(d);
        });
    }

    window.borrar = (id) => {
        const idx = objetosCargados.findIndex(o => o.userData.id === id);
        if(idx > -1) {
            scene.remove(objetosCargados[idx]);
            objetosCargados.splice(idx, 1);
            actualizarInterfazLista();
            setupDragControls();
        }
    };

    function vaciar() {
        if(confirm("¿Vaciar plataforma?")) {
            objetosCargados.forEach(o => scene.remove(o));
            objetosCargados.length = 0;
            actualizarInterfazLista();
            setupDragControls();
        }
    }

    function capturarImagen() {
        renderer.render(scene, camera);
        const link = document.createElement('a');
        link.download = `Carga_KN_${new Date().getTime()}.png`;
        link.href = renderer.domElement.toDataURL("image/png");
        link.click();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
