<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KN Materiales - Simulador 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; width: 260px; background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 8px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-height: 80vh; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; font-size: 12px; }
        input, select { width: 110px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; background: #28a745; color: white; }
        
        /* Estilo para el interruptor de apilado */
        .stack-control { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 2px solid #007bff; margin: 10px 0; text-align: center; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; vertical-align: middle; margin-left: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #007bff; }
        input:checked + .slider:before { transform: translateX(26px); }

        #listaMateriales { max-height: 150px; overflow-y: auto; margin-top: 10px; border-top: 1px solid #eee; }
        .item-lista { padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 11px; align-items: center; }
        #container3d { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="ui">
  <h3 style="margin-top:0; color:#333;">KN Materiales</h3>
  
  <div class="stack-control">
    <span style="font-weight:bold; color:#007bff; font-size:13px;">MODO APILAR</span>
    <label class="switch">
      <input type="checkbox" id="checkStack">
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">Catálogo: <select id="selCatalogo"><option value="">-- Seleccionar --</option></select></div>
  <div class="row">Nombre: <input type="text" id="matName" value="Tarima Cemento"></div>
  <div class="row">Largo (m): <input type="number" id="matLargo" value="1.2" step="0.1"></div>
  <div class="row">Ancho (m): <input type="number" id="matAncho" value="1.0" step="0.1"></div>
  <div class="row">Alto (m): <input type="number" id="matAlto" value="1.0" step="0.1"></div>
  <button id="btnAdd">Añadir a Plataforma</button>
  
  <div id="listaMateriales"></div>
  
  <div style="display:flex; gap:5px; margin-top:10px;">
    <button id="btnVistaSuperior" style="background:#17a2b8; font-size:11px; padding:8px;">📐 Plano</button>
    <button id="btnCapture" style="background:#6c757d; font-size:11px; padding:8px;">📸 Foto</button>
  </div>
  <button id="btnClear" style="background:#dc3545; font-size:11px;">Vaciar Trailer</button>
</div>

<div id="container3d"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { DragControls } from 'three/addons/controls/DragControls.js';

    let scene, camera, renderer, controls, dragControls;
    let objetosCargados = [];
    let isStackingMode = false;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2c3e50);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container3d').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        crearEscenario();

        // Control de apilado (Switch)
        const checkStack = document.getElementById('checkStack');
        checkStack.addEventListener('change', (e) => {
            isStackingMode = e.target.checked;
        });

        document.getElementById('btnAdd').onclick = añadirMaterial;
        document.getElementById('btnClear').onclick = vaciar;
        document.getElementById('btnCapture').onclick = capturarImagen;
        document.getElementById('btnVistaSuperior').onclick = () => {
            camera.position.set(6, 18, 0); 
            controls.target.set(6, 0, 0);
            controls.update();
        };

        setupDragControls();
    }

    function crearEscenario() {
        const plataforma = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 3), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        plataforma.position.set(6, -0.1, 0);
        scene.add(plataforma);
        scene.add(new THREE.GridHelper(40, 40, 0x444444, 0x333333));
    }

    function setupDragControls() {
        if(dragControls) dragControls.dispose();
        dragControls = new DragControls(objetosCargados, camera, renderer.domElement);
        
        dragControls.addEventListener('dragstart', () => controls.enabled = false);
        dragControls.addEventListener('drag', (e) => {
            const obj = e.object;
            if (isStackingMode) {
                // Modo Apilar: Bloqueamos X y Z, solo permitimos mover en Y (altura)
                obj.position.x = obj.userData.lastX || obj.position.x;
                obj.position.z = obj.userData.lastZ || obj.position.z;
            } else {
                // Modo Normal: Bloqueamos Y, movemos en el piso (X, Z)
                obj.position.y = obj.userData.currentY || (obj.userData.alto / 2);
                obj.userData.lastX = obj.position.x;
                obj.userData.lastZ = obj.position.z;
            }
        });
        dragControls.addEventListener('dragend', (e) => {
            controls.enabled = true;
            e.object.userData.currentY = e.object.position.y;
        });
    }

    function añadirMaterial() {
        const l = parseFloat(document.getElementById('matLargo').value);
        const a = parseFloat(document.getElementById('matAncho').value);
        const h = parseFloat(document.getElementById('matAlto').value);
        const nom = document.getElementById('matName').value;
        
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(l, h, a), 
            new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff })
        );
        mesh.position.set(l/2, h/2, 0);
        mesh.userData = { alto: h, nombre: nom, id: Date.now(), currentY: h/2 };
        
        scene.add(mesh);
        objetosCargados.push(mesh);
        actualizarInterfaz();
        setupDragControls();
    }

    function actualizarInterfaz() {
        const list = document.getElementById('listaMateriales');
        list.innerHTML = '';
        objetosCargados.forEach(obj => {
            const d = document.createElement('div'); d.className = 'item-lista';
            d.innerHTML = `<span>${obj.userData.nombre}</span> <button onclick="window.borrar(${obj.userData.id})" style="width:20px; background:red; padding:2px;">X</button>`;
            list.appendChild(d);
        });
    }

    window.borrar = (id) => {
        const idx = objetosCargados.findIndex(o => o.userData.id === id);
        if(idx > -1) {
            scene.remove(objetosCargados[idx]);
            objetosCargados.splice(idx, 1);
            actualizarInterfaz();
            setupDragControls();
        }
    };

    function vaciar() {
        if(confirm("¿Vaciar trailer?")) {
            objetosCargados.forEach(o => scene.remove(o));
            objetosCargados.length = 0;
            actualizarInterfaz();
            setupDragControls();
        }
    }

    function capturarImagen() {
        renderer.render(scene, camera);
        const link = document.createElement('a');
        link.download = `Carga_KN_${new Date().getTime()}.png`;
        link.href = renderer.domElement.toDataURL("image/png");
        link.click();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
